# regime_sets.yaml
# Generated by research/02_make_regimes.py
#
# Conventions:
# - Codes are integers; missing is <NA> in reports.
# - For set codes, see mapping notes under each set.

regime_columns:
  regime_code_1d:
    type: int
    mapping:
      0: BEAR_HIGH
      1: BEAR_LOW
      2: BULL_HIGH
      3: BULL_LOW
  trend_regime_code_1d:
    type: int
    mapping:
      0: BEAR
      1: BULL
  vol_regime_code_1d:
    type: int
    mapping:
      0: LOW_VOL
      1: HIGH_VOL
  funding_regime_code:
    type: int
    mapping:
      -1: NEG
       0: NEU
       1: POS
    params:
      neutral_eps_abs_funding: 9.99999974737875e-05
  oi_regime_code:
    type: int
    mapping:
      -1: DOWN
       0: NORM
       1: UP
    params:
      source: oi_z_7d
      q33: 0.2482613429427148
      q66: 1.7805748581886294
  btc_risk_regime_code:
    type: int
    mapping:
      0: DOWN_LOW
      1: DOWN_HIGH
      2: UP_LOW
      3: UP_HIGH
    params:
      btc_vol_hi: 0.753777980804443
  freshness_code:
    type: int
    mapping:
      0: FRESH
      1: MID
      2: STALE
    params:
      q33: 0.00347222222222222
      q66: 0.00694444444444444
  compression_code:
    type: int
    mapping:
      0: TIGHT
      1: MID
      2: WIDE
    params:
      q33: 0.7548243247239856
      q66: 1.0869279093365403

regime_sets:
  S1_regime_code_1d:
    columns: [regime_code_1d]
    code: "same as regime_code_1d"
  S2_markov_x_vol1d:
    columns: [markov_state_4h, vol_regime_code_1d]
    code: "markov_state_4h*2 + vol_regime_code_1d  => 0..3"
  S3_funding_x_oi:
    columns: [funding_regime_code, oi_regime_code]
    code: "(funding_regime_code+1)*3 + (oi_regime_code+1) => 0..8"
  S4_crowd_x_trend1d:
    columns: [crowd_side, trend_regime_code_1d]
    code: "(crowd_side+1)*2 + trend_regime_code_1d => 0..5"
  S5_btcRisk_x_regimeUp:
    columns: [btc_risk_regime_code, regime_up]
    code: "btc_risk_regime_code*2 + regime_up => 0..7"
  S6_fresh_x_compress:
    columns: [freshness_code, compression_code]
    code: "freshness_code*3 + compression_code => 0..8"

product_slice:
  risk_on:
    definition: "1[(regime_up==1) & (btc_trend_up==1) & (btc_vol_high==0)]"
